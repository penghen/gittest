<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试工具箱</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232f8ee8'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-size='13' font-family='Arial' font-weight='700' fill='white'%3E%7B%7D%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --blue: #2f8ee8;
            --blue-dark: #176fc2;
            --blue-soft: #edf6ff;
            --line: #e6e9ee;
            --text: #222831;
            --muted: #7d8792;
            --bg: #f5f7fa;
            --panel: #ffffff;
            --green: #1f9d55;
            --red: #d93025;
            --amber: #c77700;
        }

        * {
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            line-height: 1.5;
            overflow: hidden;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        button {
            border: 0;
        }

        .page {
            width: min(1480px, calc(100% - 48px));
            height: calc(100vh - 74px);
            margin: 0 auto;
            padding: 20px 0;
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 24px;
            align-items: stretch;
            overflow: hidden;
        }

        .header {
            background: var(--panel);
            border-bottom: 1px solid #d8dee6;
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
        }

        .header-inner {
            width: min(1480px, calc(100% - 48px));
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 14px;
            height: 74px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--blue);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--blue);
            background: #f7fbff;
            position: relative;
            flex: 0 0 auto;
        }

        .brand-icon::before {
            content: "</>";
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0;
        }

        .brand-icon::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 3px;
            border-radius: 999px;
            background: var(--blue);
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
        }

        h1 {
            margin: 0;
            color: var(--blue);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .section-title {
            margin: 0 0 12px;
            padding: 0 4px;
            font-size: 18px;
            font-weight: 700;
        }

        .tool-nav {
            min-height: 0;
            padding: 16px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: auto;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .tool-card {
            min-height: 52px;
            display: grid;
            grid-template-columns: 40px minmax(0, 1fr);
            align-items: stretch;
            padding: 0 10px;
            background: var(--panel);
            border: 1px solid transparent;
            border-radius: 6px;
            color: inherit;
            text-align: left;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }

        .tool-card:hover,
        .tool-card:focus-visible {
            background: #f4f9ff;
            border-color: #cde4fb;
            outline: none;
        }

        .tool-card.active {
            background: var(--blue-soft);
            border-color: #b8dafa;
            color: var(--blue-dark);
        }

        .tool-icon {
            display: grid;
            place-items: center;
            color: var(--blue);
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0;
        }

        .tool-copy {
            min-width: 0;
            padding: 8px 0;
        }

        .tool-copy h2 {
            margin: 0 0 2px;
            font-size: 15px;
            line-height: 1.25;
            font-weight: 700;
            letter-spacing: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tool-copy p {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .workspace {
            min-height: 0;
            margin-top: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .workspace-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }

        .workspace-title {
            min-width: 0;
        }

        .workspace-title h2 {
            margin: 0 0 4px;
            font-size: 22px;
            line-height: 1.25;
        }

        .workspace-title p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .status {
            min-height: 28px;
            padding: 5px 10px;
            border-radius: 999px;
            background: #eef2f7;
            color: #53606d;
            font-size: 13px;
            white-space: nowrap;
        }

        .status.ok {
            background: #e8f6ef;
            color: var(--green);
        }

        .status.error {
            background: #fdecea;
            color: var(--red);
        }

        .status.warn {
            background: #fff6e6;
            color: var(--amber);
        }

        .tool-panel {
            display: none;
            padding: 24px;
            min-height: 0;
        }

        .tool-panel.active {
            display: block;
            flex: 1 1 auto;
            overflow: auto;
        }

        .two-cols {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 18px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .field.wide {
            grid-column: span 2;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            color: #4d5967;
            font-size: 14px;
            font-weight: 600;
        }

        textarea,
        input,
        select {
            width: 100%;
            border: 1px solid #d8dee6;
            border-radius: 6px;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }

        textarea {
            min-height: 240px;
            padding: 12px 14px;
            resize: vertical;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.55;
        }

        input,
        select {
            height: 40px;
            padding: 0 12px;
        }

        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(47, 142, 232, 0.12);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
        }

        .btn {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 6px;
            background: var(--blue);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.16s ease, transform 0.16s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            background: var(--blue-dark);
            outline: none;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn.secondary {
            background: #eef2f7;
            color: #344051;
        }

        .btn.secondary:hover,
        .btn.secondary:focus-visible {
            background: #e0e7ef;
        }

        .btn.danger {
            background: #f1f3f5;
            color: #c5221f;
        }

        .btn.danger:hover,
        .btn.danger:focus-visible {
            background: #fdecea;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            display: inline-grid;
            place-items: center;
            font-size: 15px;
            font-weight: 800;
            line-height: 1;
        }

        .output {
            min-height: 240px;
            max-height: 520px;
            overflow: auto;
            border: 1px solid #d8dee6;
            border-radius: 6px;
            background: #fbfcfe;
            padding: 12px 14px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.55;
        }

        .output.empty {
            color: #98a2ad;
            font-family: inherit;
        }

        .match-list {
            display: grid;
            gap: 10px;
        }

        .match-item {
            border: 1px solid #d8dee6;
            border-radius: 6px;
            background: #fff;
            padding: 10px 12px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
        }

        .diff-line {
            display: block;
            min-height: 22px;
            padding: 1px 8px;
            margin: 1px 0;
            border-radius: 4px;
        }

        .diff-same {
            color: #52606d;
        }

        .diff-add {
            background: #e8f6ef;
            color: #17683a;
        }

        .diff-del {
            background: #fdecea;
            color: #a52118;
        }

        .diff-summary {
            display: block;
            margin-bottom: 12px;
            padding: 12px 14px;
            border-radius: 6px;
            background: #eef6ff;
            color: #195f9f;
            font-family: inherit;
            white-space: pre-wrap;
        }

        .diff-detail {
            display: block;
            margin: 12px 0 8px;
            color: #344051;
            font-family: inherit;
            font-weight: 700;
        }

        .timestamp-result {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .metric {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fbfcfe;
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .metric strong {
            display: block;
            font-size: 16px;
            overflow-wrap: anywhere;
        }

        @media (max-width: 1180px) {
            .page {
                grid-template-columns: 280px minmax(0, 1fr);
            }

            .form-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            body {
                overflow: hidden;
            }

            .page,
            .header-inner {
                width: min(100% - 28px, 1480px);
            }

            .page {
                height: calc(100vh - 66px);
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: 220px minmax(0, 1fr);
                gap: 14px;
                padding: 14px 0;
                overflow: hidden;
            }

            .header-inner {
                height: 66px;
            }

            h1 {
                font-size: 26px;
            }

            .tool-grid,
            .two-cols,
            .timestamp-result,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .tool-card {
                grid-template-columns: 40px minmax(0, 1fr);
                min-height: 52px;
            }

            .tool-copy {
                padding: 8px 0;
            }

            .tool-copy h2 {
                font-size: 15px;
            }

            .tool-copy p {
                font-size: 14px;
            }

            .workspace-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .workspace {
                margin-top: 0;
            }

            .status {
                white-space: normal;
            }

            .tool-panel {
                padding: 18px;
            }

            .field.wide {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand-icon" aria-hidden="true"></div>
            <h1>测试工具箱</h1>
        </div>
    </header>

    <main class="page">
        <section class="tool-nav" aria-labelledby="common-title">
            <h2 class="section-title" id="common-title">常用</h2>
            <div class="tool-grid" id="toolGrid"></div>
        </section>

        <section class="workspace" aria-live="polite">
            <div class="workspace-header">
                <div class="workspace-title">
                    <h2 id="activeTitle">JSON格式化/校验</h2>
                    <p id="activeDesc">格式化、压缩并校验 JSON 数据</p>
                </div>
                <div class="status" id="statusText">准备就绪</div>
            </div>

            <div class="tool-panel active" data-panel="json">
                <div class="two-cols">
                    <div class="field">
                        <label for="jsonInput">输入 JSON</label>
                        <textarea id="jsonInput" spellcheck="false" placeholder='{"name":"tester","enabled":true}'></textarea>
                    </div>
                    <div class="field">
                        <label for="jsonOutput">输出结果</label>
                        <pre class="output empty" id="jsonOutput">处理结果会显示在这里</pre>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="json-format"><span class="btn-icon">{}</span>格式化</button>
                    <button class="btn secondary" data-action="json-minify"><span class="btn-icon">-</span>压缩</button>
                    <button class="btn secondary" data-copy="jsonOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="jsonInput,jsonOutput"><span class="btn-icon">×</span>清空</button>
                </div>
            </div>

            <div class="tool-panel" data-panel="url">
                <div class="two-cols">
                    <div class="field">
                        <label for="urlInput">输入文本</label>
                        <textarea id="urlInput" spellcheck="false" placeholder="中文、空格、?a=1&b=2"></textarea>
                    </div>
                    <div class="field">
                        <label for="urlOutput">输出结果</label>
                        <pre class="output empty" id="urlOutput">处理结果会显示在这里</pre>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="url-encode"><span class="btn-icon">%</span>编码</button>
                    <button class="btn secondary" data-action="url-decode"><span class="btn-icon">↩</span>解码</button>
                    <button class="btn secondary" data-copy="urlOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="urlInput,urlOutput"><span class="btn-icon">×</span>清空</button>
                </div>
            </div>

            <div class="tool-panel" data-panel="base64">
                <div class="two-cols">
                    <div class="field">
                        <label for="base64Input">输入文本</label>
                        <textarea id="base64Input" spellcheck="false" placeholder="支持中文的 Base64 编解码"></textarea>
                    </div>
                    <div class="field">
                        <label for="base64Output">输出结果</label>
                        <pre class="output empty" id="base64Output">处理结果会显示在这里</pre>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="base64-encode"><span class="btn-icon">B</span>编码</button>
                    <button class="btn secondary" data-action="base64-decode"><span class="btn-icon">64</span>解码</button>
                    <button class="btn secondary" data-copy="base64Output"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="base64Input,base64Output"><span class="btn-icon">×</span>清空</button>
                </div>
            </div>

            <div class="tool-panel" data-panel="timestamp">
                <div class="form-grid">
                    <div class="field wide">
                        <label for="timestampInput">时间戳或日期时间</label>
                        <input id="timestampInput" type="text" placeholder="1719993600 或 2026-06-30 12:00:00">
                    </div>
                    <div class="field">
                        <label for="timestampUnit">输入类型</label>
                        <select id="timestampUnit">
                            <option value="auto">自动识别</option>
                            <option value="seconds">秒时间戳</option>
                            <option value="milliseconds">毫秒时间戳</option>
                            <option value="date">日期时间</option>
                        </select>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="timestamp-now"><span class="btn-icon">T</span>当前时间</button>
                    <button class="btn secondary" data-action="timestamp-convert"><span class="btn-icon">↔</span>转换</button>
                    <button class="btn secondary" data-copy="timestampOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="timestampInput,timestampOutput"><span class="btn-icon">×</span>清空</button>
                </div>
                <pre class="output empty" id="timestampOutput">处理结果会显示在这里</pre>
            </div>

            <div class="tool-panel" data-panel="uuid">
                <div class="form-grid">
                    <div class="field">
                        <label for="uuidCount">生成数量</label>
                        <input id="uuidCount" type="number" min="1" max="100" value="5">
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="uuid-generate"><span class="btn-icon">#</span>生成</button>
                    <button class="btn secondary" data-copy="uuidOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="uuidOutput"><span class="btn-icon">×</span>清空</button>
                </div>
                <pre class="output empty" id="uuidOutput">处理结果会显示在这里</pre>
            </div>

            <div class="tool-panel" data-panel="regex">
                <div class="form-grid">
                    <div class="field wide">
                        <label for="regexPattern">正则表达式</label>
                        <input id="regexPattern" type="text" placeholder="例如：\\b\\w+@\\w+\\.com\\b">
                    </div>
                    <div class="field">
                        <label for="regexFlags">Flags</label>
                        <input id="regexFlags" type="text" value="g" placeholder="gim">
                    </div>
                    <div class="field full">
                        <label for="regexInput">测试文本</label>
                        <textarea id="regexInput" spellcheck="false" placeholder="在这里输入要匹配的文本"></textarea>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="regex-test"><span class="btn-icon">.*</span>测试</button>
                    <button class="btn secondary" data-copy="regexOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="regexPattern,regexInput,regexOutput"><span class="btn-icon">×</span>清空</button>
                </div>
                <pre class="output empty" id="regexOutput">处理结果会显示在这里</pre>
            </div>

            <div class="tool-panel" data-panel="hash">
                <div class="form-grid">
                    <div class="field full">
                        <label for="hashInput">输入文本</label>
                        <textarea id="hashInput" spellcheck="false" placeholder="输入要生成 Hash 的文本"></textarea>
                    </div>
                    <div class="field">
                        <label for="hashAlgo">算法</label>
                        <select id="hashAlgo">
                            <option value="SHA-256">SHA-256</option>
                            <option value="SHA-1">SHA-1</option>
                            <option value="SHA-384">SHA-384</option>
                            <option value="SHA-512">SHA-512</option>
                        </select>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="hash-generate"><span class="btn-icon">H</span>生成</button>
                    <button class="btn secondary" data-copy="hashOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="hashInput,hashOutput"><span class="btn-icon">×</span>清空</button>
                </div>
                <pre class="output empty" id="hashOutput">处理结果会显示在这里</pre>
            </div>

            <div class="tool-panel" data-panel="diff">
                <div class="two-cols">
                    <div class="field">
                        <label for="diffLeft">文本 A</label>
                        <textarea id="diffLeft" spellcheck="false" placeholder="第一段文本"></textarea>
                    </div>
                    <div class="field">
                        <label for="diffRight">文本 B</label>
                        <textarea id="diffRight" spellcheck="false" placeholder="第二段文本"></textarea>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn" data-action="diff-run"><span class="btn-icon">Δ</span>比较</button>
                    <button class="btn secondary" data-copy="diffOutput"><span class="btn-icon">[]</span>复制</button>
                    <button class="btn danger" data-clear="diffLeft,diffRight,diffOutput"><span class="btn-icon">×</span>清空</button>
                </div>
                <pre class="output empty" id="diffOutput">处理结果会显示在这里</pre>
            </div>
        </section>
    </main>

    <script>
        const tools = [
            { id: "json", icon: "JSON", title: "JSON格式化/校验", desc: "格式化、压缩并校验 JSON 数据" },
            { id: "url", icon: "URL", title: "URL编码/解码", desc: "对中文和特殊字符进行 URL 转换" },
            { id: "base64", icon: "B64", title: "Base64转码/解码", desc: "支持中文 UTF-8 文本转换" },
            { id: "timestamp", icon: "TIME", title: "Unix时间戳", desc: "秒、毫秒时间戳与日期互转" },
            { id: "uuid", icon: "UUID", title: "UUID生成", desc: "批量生成 v4 UUID" },
            { id: "regex", icon: ".*", title: "正则测试", desc: "测试表达式并查看匹配结果" },
            { id: "hash", icon: "HASH", title: "Hash生成", desc: "生成 SHA 系列摘要" },
            { id: "diff", icon: "DIFF", title: "Diff文本比较", desc: "按行比较两段文本差异" }
        ];

        const toolGrid = document.getElementById("toolGrid");
        const activeTitle = document.getElementById("activeTitle");
        const activeDesc = document.getElementById("activeDesc");
        const statusText = document.getElementById("statusText");

        function initCards() {
            toolGrid.innerHTML = tools.map((tool, index) => `
                <button class="tool-card${index === 0 ? " active" : ""}" type="button" data-tool="${tool.id}">
                    <span class="tool-icon" aria-hidden="true">${tool.icon}</span>
                    <span class="tool-copy">
                        <h2>${tool.title}</h2>
                        <p>${tool.desc}</p>
                    </span>
                </button>
            `).join("");
        }

        function setStatus(message, type = "") {
            statusText.textContent = message;
            statusText.className = `status${type ? ` ${type}` : ""}`;
        }

        function getValue(id) {
            return document.getElementById(id).value;
        }

        function setOutput(id, value, empty = false) {
            const output = document.getElementById(id);
            output.textContent = value;
            output.classList.toggle("empty", empty);
        }

        function readOutput(id) {
            return document.getElementById(id).textContent;
        }

        function resetOutput(output) {
            output.textContent = "处理结果会显示在这里";
            output.classList.add("empty");
        }

        function clearPanel(id) {
            const panel = document.querySelector(`[data-panel="${id}"]`);
            if (!panel) return;

            panel.querySelectorAll("textarea, input").forEach((field) => {
                field.value = field.defaultValue || "";
            });
            panel.querySelectorAll("select").forEach((field) => {
                field.selectedIndex = 0;
            });
            panel.querySelectorAll(".output").forEach(resetOutput);
        }

        function switchTool(id) {
            const tool = tools.find((item) => item.id === id);
            if (!tool) return;
            const current = document.querySelector(".tool-card.active")?.dataset.tool;

            document.querySelectorAll(".tool-card").forEach((card) => {
                card.classList.toggle("active", card.dataset.tool === id);
            });
            document.querySelectorAll(".tool-panel").forEach((panel) => {
                panel.classList.toggle("active", panel.dataset.panel === id);
            });

            if (current !== id) {
                clearPanel(id);
            }
            activeTitle.textContent = tool.title;
            activeDesc.textContent = tool.desc;
            setStatus("准备就绪");
        }

        function normalizeDateInput(value) {
            return value.trim().replace(/-/g, "/");
        }

        function formatDate(date) {
            const pad = (num) => String(num).padStart(2, "0");
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
        }

        function renderTimestamp(date) {
            const millis = date.getTime();
            const seconds = Math.floor(millis / 1000);
            const iso = date.toISOString();
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "本地时区";
            return [
                `本地时间: ${formatDate(date)}`,
                `秒时间戳: ${seconds}`,
                `毫秒时间戳: ${millis}`,
                `UTC ISO: ${iso}`,
                `时区: ${timezone}`,
                `星期: ${["日", "一", "二", "三", "四", "五", "六"][date.getDay()]}`
            ].join("\n");
        }

        function encodeBase64(text) {
            const bytes = new TextEncoder().encode(text);
            let binary = "";
            bytes.forEach((byte) => {
                binary += String.fromCharCode(byte);
            });
            return btoa(binary);
        }

        function decodeBase64(text) {
            const binary = atob(text);
            const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
            return new TextDecoder().decode(bytes);
        }

        function uuidv4() {
            if (crypto.randomUUID) {
                return crypto.randomUUID();
            }
            const bytes = new Uint8Array(16);
            crypto.getRandomValues(bytes);
            bytes[6] = (bytes[6] & 0x0f) | 0x40;
            bytes[8] = (bytes[8] & 0x3f) | 0x80;
            const hex = Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0"));
            return `${hex.slice(0, 4).join("")}-${hex.slice(4, 6).join("")}-${hex.slice(6, 8).join("")}-${hex.slice(8, 10).join("")}-${hex.slice(10, 16).join("")}`;
        }

        async function hashText(text, algorithm) {
            const data = new TextEncoder().encode(text);
            const digest = await crypto.subtle.digest(algorithm, data);
            return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, "0")).join("");
        }

        function lcsMatrix(left, right) {
            const matrix = Array.from({ length: left.length + 1 }, () => Array(right.length + 1).fill(0));
            for (let i = left.length - 1; i >= 0; i--) {
                for (let j = right.length - 1; j >= 0; j--) {
                    matrix[i][j] = left[i] === right[j]
                        ? matrix[i + 1][j + 1] + 1
                        : Math.max(matrix[i + 1][j], matrix[i][j + 1]);
                }
            }
            return matrix;
        }

        function diffLines(leftText, rightText) {
            const left = leftText.split("\n");
            const right = rightText.split("\n");
            const matrix = lcsMatrix(left, right);
            const rows = [];
            let i = 0;
            let j = 0;

            while (i < left.length && j < right.length) {
                if (left[i] === right[j]) {
                    rows.push({ type: "same", leftLine: i + 1, rightLine: j + 1, value: left[i] });
                    i++;
                    j++;
                } else if (matrix[i + 1][j] >= matrix[i][j + 1]) {
                    rows.push({ type: "del", leftLine: i + 1, rightLine: null, value: left[i] });
                    i++;
                } else {
                    rows.push({ type: "add", leftLine: null, rightLine: j + 1, value: right[j] });
                    j++;
                }
            }
            while (i < left.length) {
                rows.push({ type: "del", leftLine: i + 1, rightLine: null, value: left[i++] });
            }
            while (j < right.length) {
                rows.push({ type: "add", leftLine: null, rightLine: j + 1, value: right[j++] });
            }
            return rows;
        }

        function summarizeJson(value) {
            if (Array.isArray(value)) {
                return `数组，${value.length} 项`;
            }
            if (value !== null && typeof value === "object") {
                return `对象，${Object.keys(value).length} 个顶层字段`;
            }
            return `${typeof value} 值`;
        }

        function countChangedBlocks(rows) {
            let blocks = 0;
            let inBlock = false;
            rows.forEach((row) => {
                if (row.type === "same") {
                    inBlock = false;
                    return;
                }
                if (!inBlock) {
                    blocks++;
                    inBlock = true;
                }
            });
            return blocks;
        }

        function diffRowText(row) {
            if (row.type === "same") {
                return `  A${String(row.leftLine).padStart(4, " ")} B${String(row.rightLine).padStart(4, " ")} | ${row.value}`;
            }
            if (row.type === "del") {
                return `- A${String(row.leftLine).padStart(4, " ")}      | ${row.value}`;
            }
            return `+      B${String(row.rightLine).padStart(4, " ")} | ${row.value}`;
        }

        function buildDiffDetails(rows) {
            const details = [];
            let index = 0;
            let blockNo = 1;

            while (index < rows.length) {
                if (rows[index].type === "same") {
                    index++;
                    continue;
                }

                const block = [];
                while (index < rows.length && rows[index].type !== "same") {
                    block.push(rows[index]);
                    index++;
                }

                const delRows = block.filter((row) => row.type === "del");
                const addRows = block.filter((row) => row.type === "add");
                const leftRange = formatLineRange(delRows.map((row) => row.leftLine));
                const rightRange = formatLineRange(addRows.map((row) => row.rightLine));
                const kind = delRows.length && addRows.length ? "修改" : delRows.length ? "删除" : "新增";
                details.push(`差异 ${blockNo}: ${kind}，A行 ${leftRange || "-"}，B行 ${rightRange || "-"}`);
                if (delRows.length) {
                    details.push(`  A: ${delRows.map((row) => row.value || "(空行)").join(" / ")}`);
                }
                if (addRows.length) {
                    details.push(`  B: ${addRows.map((row) => row.value || "(空行)").join(" / ")}`);
                }
                blockNo++;
            }

            return details.join("\n");
        }

        function formatLineRange(lines) {
            const filtered = lines.filter((line) => line !== null && line !== undefined);
            if (!filtered.length) return "";
            const first = filtered[0];
            const last = filtered[filtered.length - 1];
            return first === last ? String(first) : `${first}-${last}`;
        }

        function handleJson(action) {
            try {
                const parsed = JSON.parse(getValue("jsonInput"));
                const value = action === "json-minify"
                    ? JSON.stringify(parsed)
                    : JSON.stringify(parsed, null, 2);
                setOutput("jsonOutput", value);
                setStatus(`JSON 处理成功：${summarizeJson(parsed)}，输出 ${value.length} 字符`, "ok");
            } catch (error) {
                setOutput("jsonOutput", `JSON 校验失败: ${error.message}`);
                setStatus("JSON 校验失败", "error");
            }
        }

        function handleUrl(action) {
            const input = getValue("urlInput");
            try {
                const value = action === "url-encode" ? encodeURIComponent(input) : decodeURIComponent(input);
                setOutput("urlOutput", value);
                setStatus(`URL 处理成功：${input.length} 字符 -> ${value.length} 字符`, "ok");
            } catch (error) {
                setOutput("urlOutput", `URL 解码失败: ${error.message}`);
                setStatus("URL 解码失败", "error");
            }
        }

        function handleBase64(action) {
            try {
                const input = getValue("base64Input").trim();
                const value = action === "base64-encode" ? encodeBase64(getValue("base64Input")) : decodeBase64(input);
                setOutput("base64Output", value);
                setStatus(`Base64 处理成功：输出 ${value.length} 字符`, "ok");
            } catch (error) {
                setOutput("base64Output", `Base64 解码失败: ${error.message}`);
                setStatus("Base64 解码失败", "error");
            }
        }

        function handleTimestamp(action) {
            let date;
            const raw = getValue("timestampInput").trim();
            const unit = getValue("timestampUnit");

            if (action === "timestamp-now" || !raw) {
                date = new Date();
            } else if (unit === "seconds" || (unit === "auto" && /^\d{10}$/.test(raw))) {
                date = new Date(Number(raw) * 1000);
            } else if (unit === "milliseconds" || (unit === "auto" && /^\d{13}$/.test(raw))) {
                date = new Date(Number(raw));
            } else {
                date = new Date(normalizeDateInput(raw));
            }

            if (Number.isNaN(date.getTime())) {
                setOutput("timestampOutput", "无法识别该时间，请输入秒时间戳、毫秒时间戳或日期时间。");
                setStatus("时间转换失败", "error");
                return;
            }

            setOutput("timestampOutput", renderTimestamp(date));
            setStatus("时间转换成功", "ok");
        }

        function handleUuid() {
            const countInput = document.getElementById("uuidCount");
            const count = Math.min(100, Math.max(1, Number(countInput.value) || 1));
            countInput.value = String(count);
            const value = Array.from({ length: count }, uuidv4).join("\n");
            setOutput("uuidOutput", value);
            setStatus(`已生成 ${count} 个 UUID，格式为 v4`, "ok");
        }

        function handleRegex() {
            try {
                const pattern = getValue("regexPattern");
                const flagsInput = getValue("regexFlags");
                const flags = flagsInput.includes("g") ? flagsInput : `${flagsInput}g`;
                const regex = new RegExp(pattern, flags);
                const text = getValue("regexInput");
                const matches = [];
                let match;

                while ((match = regex.exec(text)) !== null) {
                    matches.push({
                        value: match[0],
                        index: match.index,
                        groups: match.slice(1)
                    });
                    if (match[0] === "") {
                        regex.lastIndex++;
                    }
                }

                if (matches.length === 0) {
                    setOutput("regexOutput", "未匹配到结果。");
                    setStatus("未匹配到结果", "warn");
                    return;
                }

                const value = matches.map((item, index) => {
                    const before = text.slice(0, item.index);
                    const line = before.split("\n").length;
                    const column = before.length - before.lastIndexOf("\n");
                    const groupText = item.groups.length ? `\n  分组: ${JSON.stringify(item.groups)}` : "";
                    return `#${index + 1} index=${item.index} 行=${line} 列=${column}\n  匹配: ${item.value}${groupText}`;
                }).join("\n\n");
                setOutput("regexOutput", value);
                setStatus(`匹配到 ${matches.length} 项`, "ok");
            } catch (error) {
                setOutput("regexOutput", `正则错误: ${error.message}`);
                setStatus("正则错误", "error");
            }
        }

        async function handleHash() {
            try {
                const value = await hashText(getValue("hashInput"), getValue("hashAlgo"));
                setOutput("hashOutput", value);
                setStatus(`Hash 生成成功：${getValue("hashAlgo")}，${value.length} 位十六进制`, "ok");
            } catch (error) {
                setOutput("hashOutput", `Hash 生成失败: ${error.message}`);
                setStatus("Hash 生成失败", "error");
            }
        }

        function handleDiff() {
            const rows = diffLines(getValue("diffLeft"), getValue("diffRight"));
            const output = document.getElementById("diffOutput");
            if (!getValue("diffLeft") && !getValue("diffRight")) {
                setOutput("diffOutput", "请输入要比较的文本。", true);
                setStatus("等待输入", "warn");
                return;
            }

            const added = rows.filter((row) => row.type === "add").length;
            const deleted = rows.filter((row) => row.type === "del").length;
            const changedBlocks = countChangedBlocks(rows);

            if (changedBlocks === 0) {
                setOutput("diffOutput", "结论：两段文本完全一致。\n\n所有行内容相同。");
                setStatus("文本完全一致", "ok");
                return;
            }

            const summary = [
                "结论：两段文本不一致。",
                `差异块：${changedBlocks} 处`,
                `新增行：${added} 行`,
                `删除行：${deleted} 行`
            ].join("\n");
            const detail = buildDiffDetails(rows);
            const diffBody = rows.map((row) => {
                const className = row.type === "add" ? "diff-add" : row.type === "del" ? "diff-del" : "diff-same";
                return `<span class="diff-line ${className}">${escapeHtml(diffRowText(row)) || " "}</span>`;
            }).join("");
            output.innerHTML = [
                `<span class="diff-summary">${escapeHtml(summary)}</span>`,
                `<span class="diff-detail">具体不同点</span>`,
                `<span>${escapeHtml(detail)}</span>`,
                `<span class="diff-detail">行级对比</span>`,
                diffBody
            ].join("");
            output.classList.remove("empty");
            setStatus(`文本比较完成：${changedBlocks} 处不同`, "warn");
        }

        function escapeHtml(value) {
            return value
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function copyText(id) {
            const value = readOutput(id);
            if (!value || value === "处理结果会显示在这里") {
                setStatus("没有可复制的结果", "warn");
                return;
            }
            try {
                await navigator.clipboard.writeText(value);
                setStatus("已复制到剪贴板", "ok");
            } catch (error) {
                setStatus("复制失败，请手动选择文本", "error");
            }
        }

        function clearFields(ids) {
            ids.split(",").forEach((id) => {
                const element = document.getElementById(id);
                if (!element) return;
                if ("value" in element) {
                    element.value = element.defaultValue || "";
                } else if (element.classList.contains("output")) {
                    resetOutput(element);
                } else {
                    element.textContent = "处理结果会显示在这里";
                }
            });
            setStatus("已清空", "ok");
        }

        function bindEvents() {
            toolGrid.addEventListener("click", (event) => {
                const card = event.target.closest(".tool-card");
                if (card) {
                    switchTool(card.dataset.tool);
                }
            });

            document.addEventListener("click", async (event) => {
                const actionButton = event.target.closest("[data-action]");
                const copyButton = event.target.closest("[data-copy]");
                const clearButton = event.target.closest("[data-clear]");

                if (actionButton) {
                    const action = actionButton.dataset.action;
                    if (action.startsWith("json-")) handleJson(action);
                    if (action.startsWith("url-")) handleUrl(action);
                    if (action.startsWith("base64-")) handleBase64(action);
                    if (action.startsWith("timestamp-")) handleTimestamp(action);
                    if (action === "uuid-generate") handleUuid();
                    if (action === "regex-test") handleRegex();
                    if (action === "hash-generate") await handleHash();
                    if (action === "diff-run") handleDiff();
                }

                if (copyButton) {
                    await copyText(copyButton.dataset.copy);
                }

                if (clearButton) {
                    clearFields(clearButton.dataset.clear);
                }
            });
        }

        initCards();
        bindEvents();
    </script>
</body>
</html>
